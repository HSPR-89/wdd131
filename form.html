<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <link rel="stylesheet" href="styles/form.css">
</head>

<body>

    <header>
  <h1>Product Review</h1>
</header>

<main>
  <form method="get" action="review.html" class="review-form">

    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Choose a Product ...</option>
    </select>

    <fieldset class="rating">
        <legend>Overall Rating</legend>
    
        <div class="rating-row">
            <label><input type="radio" name="rating" value="1" required> ☆</label>
            <label><input type="radio" name="rating" value="2"> ☆☆</label>
            <label><input type="radio" name="rating" value="3"> ☆☆☆</label>
            <label><input type="radio" name="rating" value="4"> ☆☆☆☆</label>
            <label><input type="radio" name="rating" value="5"> ☆☆☆☆☆</label>
        </div>
    </fieldset>

    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

<fieldset class="features">
    <legend>
        Which features did you find useful in the product?
        <span class="optional">(Check all that apply)</span>
    </legend>

    <div class="feature-row">
        <input type="checkbox" value="Durability">
        <span>Durability</span>
    </div>

    <div class="feature-row">
        <input type="checkbox" value="Ease of Use">
        <span>Ease of Use</span>
    </div>

    <div class="feature-row">
        <input type="checkbox" value="Performance">
        <span>Performance</span>
    </div>

    <div class="feature-row">
        <input type="checkbox" value="Design">
        <span>Design</span>
    </div>
</fieldset>

    <label for="review">
      Written Review <span class="optional">(Optional)</span>
    </label>
    <textarea id="review" name="review"></textarea>

    <label for="username">
      Your Name <span class="optional">(Optional)</span>
    </label>
    <input type="text" id="username" name="username">

    <input type="submit" value="Post Review">

  </form>
</main>

    <footer contenteditable>
        <p> ©
            <span id="currentyear"></span>
            ⚽ Howard Pereira R⚽
            Costa Rica
        </p>
        <p id="lastmodified">
    </footer>
    <script src="scripts/form.js"></script>
</body>

</html>
